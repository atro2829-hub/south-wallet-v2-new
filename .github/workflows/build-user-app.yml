name: Build User Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v4

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          mkdir -p ../outputs
          cp app/build/outputs/apk/debug/app-debug.apk ../outputs/south-wallet-user.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: south-wallet-user-apk
          path: outputs/south-wallet-user.apk
          retention-days: 90
