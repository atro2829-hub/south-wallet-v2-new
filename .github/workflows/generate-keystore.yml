name: "🔐 Generate Signing Keystore"

# Run this ONCE manually to generate keystores, then copy the base64 output
# to GitHub Secrets: KEYSTORE_BASE64, ADMIN_KEYSTORE_BASE64

on:
  workflow_dispatch:
    inputs:
      app_target:
        description: "Which app to generate keystore for?"
        required: true
        default: "both"
        type: choice
        options: [user, admin, both]

jobs:
  generate:
    name: "🔑 Generate & Display Keystore (base64)"
    runs-on: ubuntu-latest
    steps:
      - name: "☕ Setup Java"
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: "🔐 Generate USER app keystore"
        if: inputs.app_target == 'user' || inputs.app_target == 'both'
        run: |
          keytool -genkey -v \
            -keystore south-user-release.jks \
            -alias south-user-key \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "South@Wallet2024!" \
            -keypass "South@Wallet2024!" \
            -dname "CN=South Wallet, OU=Mobile, O=QTBM, L=Aden, S=Aden, C=YE"
          echo ""
          echo "══════════════════════════════════════════════"
          echo "USER APP — Copy this to GitHub Secret: KEYSTORE_BASE64"
          echo "══════════════════════════════════════════════"
          base64 -w 0 south-user-release.jks
          echo ""
          echo "KEYSTORE_PASSWORD = South@Wallet2024!"
          echo "KEY_ALIAS = south-user-key"
          echo "KEY_PASSWORD = South@Wallet2024!"

      - name: "🔐 Generate ADMIN app keystore"
        if: inputs.app_target == 'admin' || inputs.app_target == 'both'
        run: |
          keytool -genkey -v \
            -keystore south-admin-release.jks \
            -alias south-admin-key \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass "SouthAdmin@2024!" \
            -keypass "SouthAdmin@2024!" \
            -dname "CN=South Wallet Admin, OU=Admin, O=QTBM, L=Aden, S=Aden, C=YE"
          echo ""
          echo "══════════════════════════════════════════════"
          echo "ADMIN APP — Copy this to GitHub Secret: ADMIN_KEYSTORE_BASE64"
          echo "══════════════════════════════════════════════"
          base64 -w 0 south-admin-release.jks
          echo ""
          echo "ADMIN_KEYSTORE_PASSWORD = SouthAdmin@2024!"
          echo "ADMIN_KEY_ALIAS = south-admin-key"
          echo "ADMIN_KEY_PASSWORD = SouthAdmin@2024!"

      - name: "📋 Summary"
        run: |
          echo "## 📋 ما يجب فعله بعد هذه الخطوة"
          echo ""
          echo "1. افتح GitHub → Settings → Secrets → Actions"
          echo "2. أضف هذه الأسرار:"
          echo ""
          echo "للتطبيق الرئيسي:"
          echo "  KEYSTORE_BASE64   ← (من الإخراج أعلاه)"
          echo "  KEYSTORE_PASSWORD ← South@Wallet2024!"
          echo "  KEY_ALIAS         ← south-user-key"
          echo "  KEY_PASSWORD      ← South@Wallet2024!"
          echo ""
          echo "لتطبيق الإدارة:"
          echo "  ADMIN_KEYSTORE_BASE64   ← (من الإخراج أعلاه)"
          echo "  ADMIN_KEYSTORE_PASSWORD ← SouthAdmin@2024!"
          echo "  ADMIN_KEY_ALIAS         ← south-admin-key"
          echo "  ADMIN_KEY_PASSWORD      ← SouthAdmin@2024!"
          echo ""
          echo "وأيضاً أضف:"
          echo "  SUPABASE_URL             ← رابط مشروع Supabase"
          echo "  SUPABASE_ANON_KEY        ← مفتاح anon"
          echo "  SUPABASE_SERVICE_ROLE_KEY ← مفتاح service_role"
